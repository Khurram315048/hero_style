<link rel="stylesheet" href="{{ url_for('static', filename='css/admin_css/dashboard_css.css') }}">


<aside class="profile-sidebar">
    <div class="user-info-brief">
        <div class="user-avatar-large">
            <span>{% if admin %}
                {{ admin.username }}
            </span>
             {% endif %}
        </div>
    </div>

    <nav class="profile-nav">

        <a href="{{ url_for('admin.admin_dashboard') }}" class="profile-nav-item {% if request.endpoint == 'admin.admin_dashboard' %}active{% endif %}">
            <svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
            Dashboard
        </a>

        <div class="nav-item-group">
            <a href="#" class="profile-nav-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="2" y="3" width="20" height="14" rx="2"></rect>
                    <path d="M8 21h8M12 17v4"></path>
                </svg>
                Catalog
            </a>
            <div class="submenu">
                <a href="{{url_for('admin.main_products')}}" class="submenu-item">Products</a>
                <a href="{{url_for('categories.all_categories')}}" class="submenu-item">Categories</a>
            </div>
        </div>

        <div class="nav-item-group">
            <a href="{{url_for('admin.sales')}}" class="profile-nav-item">
                <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 01-8 0"></path></svg>
                Sales
            </a>
            <div class="submenu">
                <a href="{{ url_for('admin.all_payments') }}" class="submenu-item">Payments</a>
                <a href="{{url_for('admin.all_orders')}}" class="submenu-item">Orders</a>
                <a href="{{url_for('admin.returns_orders')}}" class="submenu-item">Returns</a>
                <a href="{{url_for('admin.orders_cancels')}}" class="submenu-item">Cancellations</a>
            </div>
        </div>

        <div class="nav-item-group">
                <a href="#" class="profile-nav-item {% if request.endpoint in ['admin.customers', 'admin.all_reviews', 'admin.customer_detail'] %}active{% endif %}">
                    <svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    Users
                </a>
                <div class="submenu">
                    <a href="{{ url_for('admin.customers') }}" class="submenu-item {% if request.endpoint in ['admin.customers','admin.customer_detail'] %}active{% endif %}">Customers</a>
                    <a href="{{ url_for('admin.all_reviews') }}" class="submenu-item {% if request.endpoint == 'admin.all_reviews' %}active{% endif %}">Reviews</a>
                </div>
            </div>

        <a href="{{ url_for('admin.support_forms') }}" class="profile-nav-item">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Support Forms
        </a>

        <hr class="nav-divider">

        <a href="{{ url_for('admin.logout') }}" class="profile-nav-item logout">
            <svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
            Logout
        </a>

    </nav>
</aside>
<script src="{{ url_for('static',filename='js/script.js') }}"></script>
{% if session.get('admin_toast') %}
<script>
  document.addEventListener('DOMContentLoaded', function() {
    showAdminToast("{{ session.pop('admin_toast') }}");
  });
</script>
{% endif %}

<script>
function showAdminToast(msg) {
  let toast=document.createElement('div');
  toast.style.cssText = `
    position: fixed; bottom: 24px; right: 24px;
    background: #0d1b2a; color: #c9a84c;
    border: 1px solid rgba(201,168,76,0.35);
    border-radius: 8px; padding: 12px 20px;
    font-size: 13px; font-weight: 500;
    box-shadow: 0 8px 24px rgba(0,0,0,0.3);
    z-index: 9999; opacity: 0;
    transition: opacity 0.3s ease;
    max-width: 280px;
  `;
  toast.textContent = msg;
  document.body.appendChild(toast);
  setTimeout(() => toast.style.opacity = '1', 10);
  setTimeout(() => {
    toast.style.opacity = '0';
    setTimeout(() => toast.remove(), 300);
  }, 2500);
}
</script>

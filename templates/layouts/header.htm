<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Style | Luxury Style</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/support.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/homepage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cart_unified.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/product_page.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hero_section.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_profile.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/auth.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/orders.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/user_options.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/order_details.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/product_filter.css') }}">
</head>

<body>

<nav class="navbar">

  <input type="hidden" id="server-cart-count" value="{{ cart_count | default(0) }}">

  <a href="/" class="navbar-brand">
    <div class="brand-logo">HS</div>
    <span class="brand-name">Hero <span>Style</span></span>
  </a>

  <ul class="nav-links">

    <li><a href="/" class="active">Home</a></li>

    <li>
      <a href="#">All Categories</a>
      <ul class="sub--menu">
        <li>
          <a href="/products/all_products">Watches</a>
          <ul class="sub--menu">
            <li><a href="/products/smart_watches.htm">Smart Watches</a></li>
            <li><a href="/products/metal_watches.htm">Metal Watches</a></li>
            <li><a href="/products/leather_watches.htm">Leather Watches</a></li>
          </ul>
        </li>
        <li><a href="/products/all_earbuds">EarBuds</a></li>
        <li><a href="/products/mix_products">All Products</a></li>

      </ul>
    </li>
    <li><a href="/support">Help &amp; Support</a></li>

  </ul>
  <div class="nav-icons">
     <button type="button" class="nav-icon-btn" title="Search" onclick="openSearch()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
      </button>
    <a href="/orders/cart" class="nav-icon-btn" title="Cart">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/>
        <line x1="3" y1="6" x2="21" y2="6"/>
        <path d="M16 10a4 4 0 01-8 0"/>
      </svg>
      <span id="cart-count" class="cart-count"></span>
    </a>

    {% if not session.get('user_id') %}
    <a href="{{ url_for('users.user_login') }}" class="nav-icon-btn" title="Login">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/>
        <polyline points="10 17 15 12 10 7"/>
        <line x1="15" y1="12" x2="3" y2="12"/>
      </svg>
    </a>
    <a href="{{ url_for('users.user_signup') }}" class="hero-cta"
       style="padding:7px 16px;font-size:12px;gap:6px;text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
           width="14" height="14">
        <path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/>
        <circle cx="9" cy="7" r="4"/>
        <line x1="19" y1="8" x2="19" y2="14"/>
        <line x1="22" y1="11" x2="16" y2="11"/>
      </svg>
      Sign Up
    </a>

    {% else %}

    <a href="{{ url_for('users.user_profile') }}" class="nav-icon-btn" title="My Account">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </a>

    {% endif %}

  </div>

</nav>

<script src="{{ url_for('static', filename='js/script.js') }}"></script>

{% if session.get('toast') %}
<script>
  document.addEventListener('DOMContentLoaded', function(){
    showCartToast("{{ session.pop('toast') }}");
  });
</script>
{% endif %}


<div id="searchOverlay" class="search-overlay">
      <div class="search-box">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"
          stroke-linejoin="round" style="width:18px;height:18px;flex-shrink:0;color:rgba(201,168,76,0.7)">
          <circle cx="11" cy="11" r="8" />
          <line x1="21" y1="21" x2="16.65" y2="16.65" />
        </svg>
        <input type="text" id="searchInput" placeholder="Search watches, earbuds, categories..." autocomplete="off">
        <button type="button" class="search-close" onclick="closeSearch()">×</button>
      </div>
    </div>

</body>

</html>

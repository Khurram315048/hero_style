<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hero Style | Luxury Style</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/support.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/header.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/homepage.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/cart_unified.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/product_page.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/checkout.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/hero_section.css') }}">
</head>
<body>
<nav class="navbar">

  <input type="hidden" id="server-cart-count" value="{{ cart_count | default(0) }}">
  <a href="/" class="navbar-brand">
    <div class="brand-logo">HW</div>
    <span class="brand-name">Hero <span>Style</span></span>
  </a>

  <ul class="nav-links">
    <li><a href="/" class="active">Home</a></li>
    <li><a href="/products/all_products">Hero Watches</a>
      <ul class="sub--menu">
        <li><a href="/products/smart_watches.htm">Smart Watches</a></li>
        <li><a href="/products/leather_watches.htm">Leather Watches</a></li>
        <li><a href="/products/metal_watches.htm">Metal Watches</a></li>
      </ul>
    </li>
    <li><a href="/products/all_earbuds">Hero Earbuds</a></li>
    <li><a href="/support">Support</a></li>
  </ul>

  <div class="nav-icons">
    
    <a href="/orders/cart" class="nav-icon-btn" title="Cart">
      <svg viewBox="0 0 24 24"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
      <span id="cart-count" class="cart-count"></span>
    </a>
  </div>
  
<script src="{{ url_for('static', filename='js/script.js') }}"></script>
 
{% if session.get('toast') %}
<script>
  document.addEventListener('DOMContentLoaded',function(){
    showCartToast("{{ session.pop('toast') }}");
  });
</script>
{% endif %}
</nav>
</body>
</html>

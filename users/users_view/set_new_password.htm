{% include 'layouts/header.htm' %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-visual">
            <div class="brand-logo">HS</div>
            <h2>New Password</h2>
        </div>
        <div class="auth-form-side">
            <div class="auth-header">
                <h1>Set New Password</h1>
                <p>Choose a strong password of at least 8 characters.</p>
            </div>
            <form method="POST" action="{{ url_for('users.set_new_password') }}">
                <div class="auth-group">
                    <label class="auth-label">New Password</label>
                    <input type="password" name="new_password" class="auth-input" required placeholder="At least 8 characters">
                </div>
                <div class="auth-group">
                    <label class="auth-label">Confirm Password</label>
                    <input type="password" name="confirm_password" class="auth-input" required placeholder="Repeat password">
                </div>
                <button type="submit" class="btn-auth">Update Password</button>
            </form>
        </div>
    </div>
</section>
{% include 'layouts/footer.htm' %}

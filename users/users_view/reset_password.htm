{% include 'layouts/header.htm' %}
<section class="auth-page">
    <div class="auth-card">
        <div class="auth-visual">
            <div class="brand-logo">HS</div>
            <h2>Secure Access</h2>
        </div>
        <div class="auth-form-side">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Enter your email to receive a 6-digit code.</p>
            </div>
            <form method="POST" action="{{ url_for('users.reset_password') }}">
                <input type="hidden" name="step" value="send_otp">
                <div class="auth-group">
                    <label class="auth-label">Registered Email</label>
                    <input type="email" name="email" class="auth-input" required placeholder="you@example.com">
                </div>
                <button type="submit" class="btn-auth">Send OTP Code</button>
            </form>
            <p class="auth-footer">
                Remembered? <a href="{{ url_for('users.user_login') }}" class="auth-link">Back to Login</a>
            </p>
        </div>
    </div>
</section>
{% include 'layouts/footer.htm' %}

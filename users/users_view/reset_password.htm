{% include 'layouts/header.htm' %}


<section class="auth-page">
    <div class="auth-card">
        <div class="auth-visual">
            <div class="brand-logo">H</div>
            <h2>Secure Access</h2>
            <p>We'll send instructions to your email to safely reset your password.</p>
        </div>
        <div class="auth-form-side">
            <div class="auth-header">
                <h1>Reset Password</h1>
                <p>Lost your keys to the collection?</p>
            </div>
            <form method="POST">
                <div class="auth-group">
                    <label class="auth-label">Enter Registered Email</label>
                    <input type="email" name="email" class="auth-input" required placeholder="you@example.com">
                    <label class="auth-label">Enter New Password</label>
                    <input type="password" name="new_password" class="auth-input" required placeholder="#example123@">
                </div>
                <button type="submit" class="btn-auth">Send Reset Link</button>
            </form>
            <p class="auth-footer">
                Suddenly remembered? <a href="{{url_for('users.user_login')}}" class="auth-link">Back to Login</a>
            </p>
        </div>
    </div>
</section>

{% include 'layouts/footer.htm' %}
